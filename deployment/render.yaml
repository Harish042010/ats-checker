services:
  - type: web
    name: resumelens-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    buildContext: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: https://ats-checker-2-40mp.onrender.com
      - key: ML_SERVICE_URL
        value: https://ats-checker-p7ku.onrender.com/api
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: web
    name: resumelens-ml
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install --upgrade pip setuptools wheel && pip install --prefer-binary -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 app:app
    buildContext: ml-service
    envVars:
      - key: PORT
        value: 5001

  - type: static
    name: resumelens-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: frontend/dist
    buildContext: frontend
    envVars:
      - key: VITE_API_URL
        value: https://ats-checker-1-o87l.onrender.com/api
      - key: VITE_ML_API_URL
        value: https://ats-checker-p7ku.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
